<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solana Devnet Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f14;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: #9945ff22;
      color: #b57bff;
      border: 1px solid #9945ff55;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    .search-box {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2d2d44;
      color: #e2e8f0;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #9945ff;
    }

    input::placeholder { color: #475569; }

    button {
      background: #9945ff;
      color: #fff;
      border: none;
      padding: 0.75rem 1.4rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { background: #7c2de8; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #3d3d5c; cursor: not-allowed; }

    .card {
      background: #1e1e2e;
      border: 1px solid #2d2d44;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    #balance-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #14f195;
    }

    #balance-address {
      font-size: 0.75rem;
      color: #475569;
      font-family: monospace;
      margin-top: 0.3rem;
      word-break: break-all;
    }

    .tx-list { list-style: none; }

    .tx-item {
      border-top: 1px solid #2d2d44;
      padding: 0.85rem 0;
      display: grid;
      gap: 0.25rem;
    }

    .tx-item:first-child { border-top: none; padding-top: 0; }
    .tx-item:last-child { padding-bottom: 0; }

    .tx-sig {
      font-family: monospace;
      font-size: 0.75rem;
      color: #9945ff;
      word-break: break-all;
    }

    .tx-sig a {
      color: #9945ff;
      text-decoration: none;
    }

    .tx-sig a:hover { text-decoration: underline; }

    .tx-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .tx-meta span {
      font-size: 0.78rem;
      color: #64748b;
    }

    .tx-status {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .status-success { background: #14f19522; color: #14f195; }
    .status-failed  { background: #ff4d4d22; color: #ff6b6b; }

    .error-msg {
      background: #ff4d4d18;
      border: 1px solid #ff4d4d44;
      color: #ff6b6b;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }

    .loading {
      text-align: center;
      color: #64748b;
      padding: 2rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #2d2d44;
      border-top-color: #9945ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; }

    footer {
      text-align: center;
      margin-top: 2rem;
      color: #334155;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>&#9728; Solana Dashboard</h1>
      <p>Read live on-chain data from Solana Devnet</p>
      <span class="badge">DEVNET</span>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="address-input"
        placeholder="Enter any Solana devnet address..."
        value="TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
        spellcheck="false"
      />
      <button id="fetch-btn">Fetch Data</button>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="loading" id="loading">
      <span class="spinner"></span> Fetching on-chain data...
    </div>

    <div id="results">
      <div class="card">
        <h2>SOL Balance</h2>
        <div id="balance-value">— SOL</div>
        <div id="balance-address"></div>
      </div>

      <div class="card">
        <h2>Recent Transactions (last 5)</h2>
        <ul class="tx-list" id="tx-list"></ul>
      </div>
    </div>

    <footer>100 Days of Solana &mdash; Day 10 &bull; Built by Gopichand Challa</footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
