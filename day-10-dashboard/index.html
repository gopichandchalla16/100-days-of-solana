<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solana Devnet Dashboard — Day 10</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <rect width="34" height="34" rx="8" fill="#9945ff" fill-opacity="0.15"/>
          <path d="M9 22.5h12.5l3.5-2.5H12.5L9 22.5z" fill="#9945ff"/>
          <path d="M9 17h16l-3.5 2.5H9V17z" fill="#14f195"/>
          <path d="M21.5 11.5H9l3.5 2.5H25L21.5 11.5z" fill="#9945ff"/>
        </svg>
        <div class="logo-text">SolScan<span>Devnet Explorer</span></div>
      </div>
      <span class="badge">Devnet</span>
    </header>

    <div class="search-row">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="addr-input"
          placeholder="Enter any Solana devnet address..."
          value="TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
          spellcheck="false" autocomplete="off" />
      </div>
      <button class="btn" id="fetch-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
        </svg>
        Fetch Data
      </button>
    </div>

    <div class="error-bar" id="error-bar"></div>
    <div class="loading-bar" id="loading-bar">
      <span class="spinner"></span> Querying Solana devnet RPC…
    </div>

    <div id="results">
      <div class="stats-row">
        <div class="card">
          <div class="card-label">SOL Balance</div>
          <div class="balance-val" id="bal-val">— SOL</div>
          <div class="balance-addr" id="bal-addr"></div>
        </div>
        <div class="card">
          <div class="card-label">Transactions Found</div>
          <div class="tx-count-val" id="tx-count">0</div>
          <div class="tx-count-sub">last 5 retrieved</div>
        </div>
      </div>
      <div class="card tx-card">
        <div class="card-label">Recent Transactions</div>
        <ul class="tx-list" id="tx-list"></ul>
      </div>
    </div>

    <footer>
      100 Days of Solana &mdash; Day 10 &bull;
      Built by <a href="https://github.com/gopichandchalla16" target="_blank" rel="noopener">Gopichand Challa</a>
    </footer>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
