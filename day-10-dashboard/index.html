<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solana Devnet Dashboard</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;
      --space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;
      --space-8:2rem;--space-10:2.5rem;--space-12:3rem;
      --radius-sm:.375rem;--radius-md:.5rem;
      --radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --color-bg:#0f0f14;
      --color-surface:#16161f;
      --color-surface-2:#1c1c28;
      --color-surface-offset:#222230;
      --color-border:#2a2a3d;
      --color-divider:#1f1f2e;
      --color-text:#e2e0f0;
      --color-text-muted:#7b7a9a;
      --color-text-faint:#454460;
      --color-primary:#9945ff;
      --color-primary-hover:#7c2de8;
      --color-success:#14f195;
      --color-error:#ff6b6b;
      --shadow-sm:0 1px 2px oklch(0 0 0/.3);
      --shadow-md:0 4px 16px oklch(0 0 0/.4);
      --font-body:'Satoshi',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);padding:var(--space-8) var(--space-4);}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(oklch(0.55 0.28 290/.03) 1px,transparent 1px),linear-gradient(90deg,oklch(0.55 0.28 290/.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
    .container{max-width:800px;margin-inline:auto;position:relative;z-index:1;}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-8);}
    .logo{display:flex;align-items:center;gap:var(--space-3);}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#9945ff,#14f195);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 0 20px oklch(0.55 0.28 290/.3);}
    .logo-text{font-size:var(--text-lg);font-weight:700;}
    .logo-text span{color:var(--color-primary);}
    .badge-devnet{background:oklch(0.55 0.28 290/.15);color:var(--color-primary);border:1px solid oklch(0.55 0.28 290/.3);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
    .search-label{display:block;font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .search-row{display:flex;gap:var(--space-3);margin-bottom:var(--space-6);}
    input[type=text]{flex:1;background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text);padding:var(--space-3) var(--space-4);border-radius:var(--radius-lg);font-size:var(--text-sm);font-family:'Courier New',monospace;outline:none;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive);}
    input[type=text]:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(0.55 0.28 290/.15);}
    input::placeholder{color:var(--color-text-faint);}
    .btn-fetch{background:var(--color-primary);color:#fff;border:none;padding:var(--space-3) var(--space-6);border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:600;font-family:var(--font-body);cursor:pointer;white-space:nowrap;transition:background var(--transition-interactive),transform var(--transition-interactive),box-shadow var(--transition-interactive);}
    .btn-fetch:hover{background:var(--color-primary-hover);box-shadow:0 0 20px oklch(0.55 0.28 290/.3);}
    .btn-fetch:active{transform:scale(0.97);}
    .btn-fetch:disabled{background:var(--color-surface-offset);color:var(--color-text-faint);cursor:not-allowed;box-shadow:none;}
    .error-box{background:oklch(0.55 0.2 20/.12);border:1px solid oklch(0.55 0.2 20/.35);color:var(--color-error);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);margin-bottom:var(--space-4);display:none;}
    .error-box.visible{display:block;}
    .loading-box{text-align:center;color:var(--color-text-muted);padding:var(--space-12);font-size:var(--text-sm);display:none;}
    .loading-box.visible{display:block;}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:var(--space-2);}
    @keyframes spin{to{transform:rotate(360deg);}}
    #results{display:none;}
    #results.visible{display:block;}
    .kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);margin-bottom:var(--space-4);}
    @media(max-width:500px){.kpi-row{grid-template-columns:1fr;}}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5) var(--space-6);box-shadow:var(--shadow-sm);}
    .card-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-2);}
    .balance-value{font-size:var(--text-xl);font-weight:700;color:var(--color-success);line-height:1.1;}
    .balance-lamports{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1);font-family:monospace;}
    .addr-value{font-size:var(--text-xs);font-family:'Courier New',monospace;color:var(--color-text-muted);word-break:break-all;line-height:1.5;}
    .card-full{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5) var(--space-6);box-shadow:var(--shadow-sm);}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);}
    .card-title{font-size:var(--text-sm);font-weight:700;}
    .tx-count{font-size:var(--text-xs);color:var(--color-text-faint);}
    .tx-list{list-style:none;}
    .tx-item{padding:var(--space-4) 0;border-top:1px solid var(--color-divider);display:grid;gap:var(--space-2);}
    .tx-item:first-child{border-top:none;padding-top:0;}
    .tx-item:last-child{padding-bottom:0;}
    .tx-sig-link{font-family:'Courier New',monospace;font-size:var(--text-xs);color:var(--color-primary);text-decoration:none;word-break:break-all;line-height:1.5;transition:color var(--transition-interactive);}
    .tx-sig-link:hover{color:#b57bff;text-decoration:underline;}
    .tx-meta{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;}
    .tx-meta-item{font-size:var(--text-xs);color:var(--color-text-muted);}
    .tx-meta-item strong{color:var(--color-text-faint);font-weight:500;margin-right:var(--space-1);}
    .status-pill{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .5rem;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;}
    .status-success{background:oklch(0.75 0.2 155/.12);color:var(--color-success);border:1px solid oklch(0.75 0.2 155/.25);}
    .status-failed{background:oklch(0.65 0.2 20/.12);color:var(--color-error);border:1px solid oklch(0.65 0.2 20/.25);}
    .empty-state{text-align:center;padding:var(--space-10);color:var(--color-text-muted);font-size:var(--text-sm);}
    .empty-state-icon{font-size:2rem;margin-bottom:var(--space-3);}
    footer{text-align:center;margin-top:var(--space-10);color:var(--color-text-faint);font-size:var(--text-xs);}
    footer a{color:var(--color-primary);text-decoration:none;}
    footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">◎</div>
        <div class="logo-text">Solana <span>Dashboard</span></div>
      </div>
      <span class="badge-devnet">Devnet</span>
    </header>

    <label class="search-label" for="address-input">Solana Address</label>
    <div class="search-row">
      <input type="text" id="address-input"
        placeholder="Enter any Solana devnet address..."
        value="TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
        spellcheck="false" autocomplete="off" />
      <button class="btn-fetch" id="fetch-btn">Fetch Data</button>
    </div>

    <div class="error-box" id="error-box"></div>
    <div class="loading-box" id="loading-box">
      <span class="spinner"></span> Fetching on-chain data from Solana devnet...
    </div>

    <div id="results">
      <div class="kpi-row">
        <div class="card">
          <div class="card-label">SOL Balance</div>
          <div class="balance-value" id="bal-sol">—</div>
          <div class="balance-lamports" id="bal-lamports">— lamports</div>
        </div>
        <div class="card">
          <div class="card-label">Address</div>
          <div class="addr-value" id="addr-display">—</div>
        </div>
      </div>
      <div class="card-full">
        <div class="card-header">
          <div class="card-title">Recent Transactions</div>
          <div class="tx-count" id="tx-count">last 5</div>
        </div>
        <ul class="tx-list" id="tx-list"></ul>
      </div>
    </div>

    <footer>
      100 Days of Solana — Day 10 &bull;
      Built by <a href="https://github.com/gopichandchalla16" target="_blank" rel="noopener">Gopichand Challa</a>
      &bull;
      <a href="https://explorer.solana.com/?cluster=devnet" target="_blank" rel="noopener">Solana Explorer ↗</a>
    </footer>
  </div>

  <script>
    const RPC = 'https://api.devnet.solana.com';
    const fetchBtn=document.getElementById('fetch-btn');
    const addrInput=document.getElementById('address-input');
    const errorBox=document.getElementById('error-box');
    const loadingBox=document.getElementById('loading-box');
    const results=document.getElementById('results');
    const balSol=document.getElementById('bal-sol');
    const balLamports=document.getElementById('bal-lamports');
    const addrDisplay=document.getElementById('addr-display');
    const txList=document.getElementById('tx-list');
    const txCount=document.getElementById('tx-count');

    async function rpc(method,params){
      const res=await fetch(RPC,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method,params})});
      const json=await res.json();
      if(json.error)throw new Error(json.error.message);
      return json.result;
    }
    function setError(msg){errorBox.textContent='\u26a0 '+msg;errorBox.classList.add('visible');}
    function clearError(){errorBox.classList.remove('visible');}
    function setLoading(on){loadingBox.classList.toggle('visible',on);fetchBtn.disabled=on;fetchBtn.textContent=on?'Loading\u2026':'Fetch Data';}

    function animateNumber(el,target){
      let start=0;const step=target/30;
      const iv=setInterval(()=>{start=Math.min(start+step,target);el.textContent=start.toFixed(9)+' SOL';if(start>=target)clearInterval(iv);},20);
    }

    async function fetchData(){
      const addr=addrInput.value.trim();
      if(!addr){setError('Please enter a Solana address.');return;}
      clearError();results.classList.remove('visible');setLoading(true);txList.innerHTML='';
      try{
        if(addr.length<32||addr.length>44)throw new Error('Invalid Solana address format.');
        const balResult=await rpc('getBalance',[addr,{commitment:'confirmed'}]);
        const lamports=balResult.value;
        const sol=lamports/1_000_000_000;
        addrDisplay.textContent=addr;
        balLamports.textContent=lamports.toLocaleString()+' lamports';
        balSol.textContent='0.000000000 SOL';
        setTimeout(()=>animateNumber(balSol,sol),50);
        const sigs=await rpc('getSignaturesForAddress',[addr,{limit:5,commitment:'confirmed'}]);
        txCount.textContent=sigs.length?`last ${sigs.length}`:'none found';
        if(!sigs.length){
          txList.innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div>No transactions found for this address on devnet.</div>';
        }else{
          sigs.forEach(tx=>{
            const time=tx.blockTime?new Date(tx.blockTime*1000).toLocaleString():'unknown';
            const url=`https://explorer.solana.com/tx/${tx.signature}?cluster=devnet`;
            const ok=!tx.err;
            const li=document.createElement('li');
            li.className='tx-item';
            li.innerHTML=`<a class="tx-sig-link" href="${url}" target="_blank" rel="noopener">${tx.signature}</a><div class="tx-meta"><span class="tx-meta-item"><strong>Slot</strong>${Number(tx.slot).toLocaleString()}</span><span class="tx-meta-item"><strong>Time</strong>${time}</span><span class="status-pill ${ok?'status-success':'status-failed'}">${ok?'\u2713 Success':'\u2717 Failed'}</span></div>`;
            txList.appendChild(li);
          });
        }
        results.classList.add('visible');
      }catch(err){
        setError(err.message||'Network error. Please try again.');
      }finally{
        setLoading(false);
      }
    }
    fetchBtn.addEventListener('click',fetchData);
    addrInput.addEventListener('keydown',e=>{if(e.key==='Enter')fetchData();});
  </script>
</body>
</html>
